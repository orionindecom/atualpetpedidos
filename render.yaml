services:
  - type: web
    name: atualpet-api
    runtime: node
    rootDir: backend
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /health/ready
    maxShutdownDelaySeconds: 15
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: MONGO_MAX_POOL_SIZE
        value: "10"
      - key: MONGO_AUTO_INDEX
        value: "false"
